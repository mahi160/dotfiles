"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
# add_newline = true

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[➜](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = false

[directory]
# style = "bg:#DA627D"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "📝 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[battery]
full_symbol = '🔋 '
charging_symbol = '⚡️ '
discharging_symbol = '💀 '

[[battery.display]] # 'bold red' style and discharging_symbol when capacity is between 0% and 10%
threshold = 10
style = 'bold red'

[[battery.display]] # 'bold yellow' style and 💦 symbol when capacity is between 10% and 30%
threshold = 30
discharging_symbol = '💦'

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = '%T'
utc_time_offset = '-5'
time_range = '10:00:00-14:00:00'
style = 'bold yellow'

[sudo]
style = 'bold green'
symbol = '👩‍💻 '
disabled = true

[hostname]
ssh_only = true
format = '@[$ssh_symbol](bold blue) on [$hostname](bold red) '
trim_at = '.companyname.com'
disabled = false

[localip]
ssh_only = false
format = '@[$localipv4](bold #34495e) '
disabled = false

[username]
style_user = '#34495e bold'
style_root = '#c0392b bold'
format = '[$user]($style) '
disabled = false
show_always = true

# [git_status]
# conflicted = '🏳'
# ahead = '😎 ${count}'
# behind = '😰 ${count}'
# diverged = '😵 ⇡${ahead_count}⇣${behind_count}'
# up_to_date = '✓'
# untracked = '🤷'
# stashed = '📦'
# modified = '📝'
# staged = '[++\($count\)](green)'
# renamed = '👅'
# deleted = '🗑'

[git_status]
ahead = '[⇡${count}](#1abc9c)'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '[⇣${count}](#e74c3c)'