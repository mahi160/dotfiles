import = [
  "~/.config/alacritty/themes/rose-pine-dawn.toml"
]

[env]
TERM = "xterm-256color"

[font]
size = 12.0

[font.bold]
family = "Monaspace Krypton"
style = "Bold"

[font.bold_italic]
style = "Bold Italic"
family = "JetbrainsMonoNerd Font Mono"

[font.italic]
style = "Italic"
family = "JetbrainsMonoNerd Font Mono"

[font.normal]
style = "Regular"
family = "JetbrainsMonoNerd Font Mono"

[window]
padding = {x=4}
dimensions = { columns = 80, lines = 24}
# opacity = 0.95
blur = true

